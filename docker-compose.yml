version: "3.9"
services:
  node-secu:
    image: postgres
    restart: always
    container_name: node-secu-database
    ports:
      - 5454:5432
    environment:
      POSTGRES_PASSWORD: example
      PGDATA: /data/postgres
    volumes:
      - postgres:/data/postgres

 
volumes:
  postgres:
  rabbitmq: